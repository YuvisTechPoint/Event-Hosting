name: hievents-production

x-backend-environment: &backend-environment
  APP_NAME: ${APP_NAME:-Event Hosting}
  APP_ENV: ${APP_ENV:-production}
  APP_KEY: ${APP_KEY:?APP_KEY is required}
  APP_DEBUG: ${APP_DEBUG:-false}
  APP_URL: ${APP_URL:?APP_URL is required}
  APP_FRONTEND_URL: ${APP_FRONTEND_URL:?APP_FRONTEND_URL is required}
  APP_CDN_URL: ${APP_CDN_URL:-${APP_FRONTEND_URL}/storage}
  APP_DISABLE_REGISTRATION: ${APP_DISABLE_REGISTRATION:-false}
  APP_SAAS_MODE_ENABLED: ${APP_SAAS_MODE_ENABLED:-false}
  APP_SAAS_STRIPE_APPLICATION_FEE_PERCENT: ${APP_SAAS_STRIPE_APPLICATION_FEE_PERCENT:-0}
  APP_SAAS_STRIPE_APPLICATION_FEE_FIXED: ${APP_SAAS_STRIPE_APPLICATION_FEE_FIXED:-0}
  APP_PLATFORM_SUPPORT_EMAIL: ${APP_PLATFORM_SUPPORT_EMAIL:-support@example.com}
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  JWT_ALGO: ${JWT_ALGO:-HS256}
  LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: ${POSTGRES_DB:-hievents}
  DB_USERNAME: ${POSTGRES_USER:-hievents}
  DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
  REDIS_HOST: redis
  REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
  REDIS_PORT: 6379
  CACHE_DRIVER: ${CACHE_DRIVER:-redis}
  SESSION_DRIVER: ${SESSION_DRIVER:-redis}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
  WEBHOOK_QUEUE_NAME: ${WEBHOOK_QUEUE_NAME:-webhook-queue}
  MAIL_MAILER: ${MAIL_MAILER:-smtp}
  MAIL_HOST: ${MAIL_HOST:-}
  MAIL_PORT: ${MAIL_PORT:-587}
  MAIL_USERNAME: ${MAIL_USERNAME:-}
  MAIL_PASSWORD: ${MAIL_PASSWORD:-}
  MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@example.com}
  MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Event Hosting}
  FILESYSTEM_PUBLIC_DISK: ${FILESYSTEM_PUBLIC_DISK:-public}
  FILESYSTEM_PRIVATE_DISK: ${FILESYSTEM_PRIVATE_DISK:-local}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
  AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
  AWS_PUBLIC_BUCKET: ${AWS_PUBLIC_BUCKET:-}
  AWS_PRIVATE_BUCKET: ${AWS_PRIVATE_BUCKET:-}
  AWS_ENDPOINT: ${AWS_ENDPOINT:-}
  AWS_USE_PATH_STYLE_ENDPOINT: ${AWS_USE_PATH_STYLE_ENDPOINT:-true}
  STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY:-}
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
  BROADCAST_DRIVER: ${BROADCAST_DRIVER:-pusher}
  PUSHER_APP_ID: ${PUSHER_APP_ID:-hievents}
  PUSHER_APP_KEY: ${PUSHER_APP_KEY:?PUSHER_APP_KEY is required}
  PUSHER_APP_SECRET: ${PUSHER_APP_SECRET:?PUSHER_APP_SECRET is required}
  PUSHER_HOST: ${PUSHER_HOST:-soketi}
  PUSHER_PORT: ${PUSHER_PORT:-6001}
  PUSHER_SCHEME: ${PUSHER_SCHEME:-http}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}

x-json-logging: &json-logging
  driver: json-file
  options:
    max-size: 10m
    max-file: "5"

services:
  postgres:
    image: postgres:15-alpine
    container_name: hievents_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hievents}
      POSTGRES_USER: ${POSTGRES_USER:-hievents}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ../postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    networks:
      hievents_internal:
        ipv4_address: 172.20.0.10
    # Dev only — expose PostgreSQL to the host:
    # ports:
    #   - "5432:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER:-hievents} -d $${POSTGRES_DB:-hievents}
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
    logging: *json-logging

  redis:
    image: redis:7-alpine
    container_name: hievents_redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - "60 1000"
      - --save
      - "300 10"
      - --save
      - "900 1"
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --loglevel
      - warning
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    networks:
      hievents_internal:
        ipv4_address: 172.20.0.11
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: production
    container_name: hievents_backend
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64M
    environment:
      <<: *backend-environment
    volumes:
      - storage_data:/var/www/html/storage
      - bootstrap_cache:/var/www/html/bootstrap/cache
    networks:
      hievents_public: {}
      hievents_internal:
        ipv4_address: 172.20.0.12
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8080/health
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "10"

  queue_worker:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: production
    container_name: hievents_queue
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64M
    entrypoint:
      - /usr/local/bin/docker-entrypoint.sh
    command:
      - queue:work
      - redis
      - --sleep=3
      - --tries=3
      - --timeout=90
      - --max-time=3600
      - --memory=256
      - --queue=default,${WEBHOOK_QUEUE_NAME:-webhook-queue}
    environment:
      <<: *backend-environment
      RUN_MIGRATIONS: "false"
    volumes:
      - storage_data:/var/www/html/storage
      - bootstrap_cache:/var/www/html/bootstrap/cache
    networks:
      hievents_internal:
        ipv4_address: 172.20.0.13
    depends_on:
      backend:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: "5"

  scheduler:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: production
    container_name: hievents_scheduler
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
    command:
      - while true; do php /var/www/html/artisan schedule:run --no-interaction; sleep 60; done
    environment:
      <<: *backend-environment
      RUN_MIGRATIONS: "false"
    volumes:
      - storage_data:/var/www/html/storage
      - bootstrap_cache:/var/www/html/bootstrap/cache
    networks:
      hievents_internal:
        ipv4_address: 172.20.0.14
    depends_on:
      backend:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    logging: *json-logging

  soketi:
    image: quay.io/soketi/soketi:1.6-16-debian
    container_name: hievents_soketi
    restart: unless-stopped
    environment:
      SOKETI_HOST: "0.0.0.0"
      SOKETI_PORT: "6001"
      SOKETI_METRICS_ENABLED: "1"
      SOKETI_METRICS_SERVER_PORT: "9601"
      SOKETI_DEBUG: "0"
      SOKETI_DEFAULT_APP_ID: ${PUSHER_APP_ID:-hievents}
      SOKETI_DEFAULT_APP_KEY: ${PUSHER_APP_KEY:?PUSHER_APP_KEY is required}
      SOKETI_DEFAULT_APP_SECRET: ${PUSHER_APP_SECRET:?PUSHER_APP_SECRET is required}
      SOKETI_DEFAULT_APP_MAX_CONNS: "10000"
      SOKETI_DEFAULT_APP_ENABLE_CLIENT_MESSAGES: "true"
      SOKETI_DEFAULT_APP_ENABLED: "true"
      SOKETI_ADAPTER_DRIVER: redis
      SOKETI_DB_REDIS_HOST: redis
      SOKETI_DB_REDIS_PORT: "6379"
      SOKETI_DB_REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      SOKETI_DB_REDIS_DB: "2"
    networks:
      hievents_public: {}
      hievents_internal:
        ipv4_address: 172.20.0.15
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - curl -sf http://127.0.0.1:6001/ > /dev/null || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: "5"

  frontend:
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
      target: production
      args:
        VITE_API_URL_CLIENT: ${VITE_API_URL_CLIENT:?VITE_API_URL_CLIENT is required}
        VITE_API_URL_SERVER: ${VITE_API_URL_SERVER:?VITE_API_URL_SERVER is required}
        VITE_FRONTEND_URL: ${VITE_FRONTEND_URL:?VITE_FRONTEND_URL is required}
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
        VITE_APP_NAME: ${VITE_APP_NAME:-Event Hosting}
        VITE_PUSHER_APP_KEY: ${PUSHER_APP_KEY:-}
        VITE_PUSHER_HOST: ${VITE_PUSHER_HOST:-}
        VITE_PUSHER_PORT: ${VITE_PUSHER_PORT:-443}
        VITE_PUSHER_SCHEME: ${VITE_PUSHER_SCHEME:-https}
    container_name: hievents_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      VITE_API_URL_CLIENT: ${VITE_API_URL_CLIENT}
      VITE_API_URL_SERVER: ${VITE_API_URL_SERVER}
      VITE_FRONTEND_URL: ${VITE_FRONTEND_URL}
      VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
      VITE_APP_NAME: ${VITE_APP_NAME:-Event Hosting}
      VITE_PUSHER_APP_KEY: ${PUSHER_APP_KEY:-}
      VITE_PUSHER_HOST: ${VITE_PUSHER_HOST:-}
      VITE_PUSHER_PORT: ${VITE_PUSHER_PORT:-443}
      VITE_PUSHER_SCHEME: ${VITE_PUSHER_SCHEME:-https}
    networks:
      hievents_public: {}
      hievents_internal:
        ipv4_address: 172.20.0.16
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - wget
        - -qO-
        - http://127.0.0.1:5678/
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: "5"

  nginx:
    image: nginx:1.25-alpine
    container_name: hievents_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/hievents.conf:/etc/nginx/conf.d/hievents.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - storage_data:/var/www/storage:ro
      - nginx_logs:/var/log/nginx
    networks:
      hievents_public: {}
      hievents_internal:
        ipv4_address: 172.20.0.17
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      soketi:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - wget
        - -qO-
        - http://127.0.0.1/api/health
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "10"

networks:
  hievents_public:
    driver: bridge
  hievents_internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  postgres_data:
  redis_data:
  storage_data:
  bootstrap_cache:
  nginx_logs:
  soketi_data:
