# Event Hosting — production reverse proxy
# Routes: /api → Laravel backend, / → Vite SSR frontend, /app → Soketi WebSockets

server {
    listen 80;
    listen [::]:80;
    server_name _;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    client_max_body_size 20M;

    # Health — no rate limit (deploy-update.sh HEALTH_URL, compose healthcheck)
    location = /api/health {
        proxy_pass http://backend_pool/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        access_log off;
    }

    # Laravel Echo private channel auth (JWT via httpOnly cookie)
    location = /api/broadcasting/auth {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend_pool/broadcasting/auth;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60;
    }

    # Auth endpoints — stricter rate limit
    location ~ ^/api/(auth/|login$|register$) {
        limit_req zone=auth_limit burst=5 nodelay;

        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60;
    }

    # Incoming webhooks (Stripe, etc.)
    location ~ ^/api/webhooks/ {
        limit_req zone=webhook_limit burst=30 nodelay;

        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120;
        client_body_timeout 120;
    }

    # File uploads
    location ~ ^/api/(images$|events/[^/]+/images$) {
        limit_req zone=upload_limit burst=10 nodelay;

        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 300;
        client_body_timeout 120;
        client_max_body_size 20M;
    }

    # General API — strip /api prefix
    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;

        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 300;
        proxy_connect_timeout 10;
        proxy_send_timeout 60;
        client_body_timeout 60;
    }

    # Public storage (shared storage_data volume)
    location /storage/ {
        alias /var/www/storage/app/public/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;

        location ~* \.(php|php\d)$ {
            deny all;
        }
    }

    # Soketi WebSockets (Pusher protocol path)
    location /app/ {
        proxy_pass http://soketi_pool;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    # Vite/React SSR frontend
    location / {
        proxy_pass http://frontend_pool;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 120;
        proxy_buffering off;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — uncomment after mounting TLS certificates into the nginx container.
#
# 1. Add to docker-compose.yml under nginx.volumes:
#      - ./nginx/ssl:/etc/nginx/ssl:ro
